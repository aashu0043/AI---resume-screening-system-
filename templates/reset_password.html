<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - AI Resume Screener</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #0f172a; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; }
        .card { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 10px; border: 1px solid #334155; background: #1e293b; color: white; box-sizing: border-box; font-size: 0.95rem; }
        button { width: 100%; padding: 12px; background: #10b981; border: none; border-radius: 10px; color: white; font-weight: 600; cursor: pointer; font-size: 1rem; }
        button:hover { background: #059669; }
        p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Set New Password</h2>
        <p>Enter your new secure password below.</p>
        <form action="/reset_password" method="POST">
            <input type="hidden" name="mobile" value="{{ mobile }}">
            <input type="password" name="password" placeholder="New Password" required minlength="4">
            <button type="submit">Update Password</button>
        </form>
    </div>
</body>
</html>
