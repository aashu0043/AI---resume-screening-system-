<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Screening System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* 1. Animated Gradient Background */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #2e1065, #031e42);
            background-size: 400% 400%;
            animation: gradientAnimation 15s ease infinite;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 2. Glassmorphism Card Wrapper */
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px 40px;
            border-radius: 24px;
            text-align: center;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 3. Creative Typography with Glow */
        h1 {
            color: #ffffff;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            letter-spacing: 1px;
            text-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
        }

        p {
            color: #94a3b8;
            font-size: 1.1rem;
            margin-bottom: 40px;
            font-weight: 300;
        }

        /* 4. Animated & Glowing Buttons */
        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .btn {
            text-decoration: none;
            padding: 14px 35px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .btn-login {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .btn-register {
            background: linear-gradient(135deg, #10b981, #047857);
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        }

        /* Hover Animations */
        .btn:hover {
            transform: translateY(-5px) scale(1.03);
            box-shadow: 0 8px 25px rgba(255, 255, 255, 0.2);
        }

        .btn-login:hover {
            box-shadow: 0 0 25px #3b82f6;
        }

        .btn-register:hover {
            box-shadow: 0 0 25px #10b981;
        }

        /* Ripple effect animation inside buttons */
        .btn::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.2);
            width: 100px;
            height: 100px;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            transition: transform 0.5s ease-out;
            opacity: 0;
        }

        .btn:active::after {
            transform: translate(-50%, -50%) scale(4);
            opacity: 1;
            transition: 0s;
        }
    </style>
</head>
<body>

    <div class="container">
        <div style="font-size: 4rem; color: #a78bfa; margin-bottom: 20px; animation: pulse 2s infinite;">
            <i class="fa-solid fa-brain"></i>
        </div>
        
        <h1>AI Resume Screening System</h1>
        <p>Welcome! Please register or login to proceed with the system.</p>
        
        <div class="btn-group">
            <a href="/login" class="btn btn-login">
                <i class="fa-solid fa-right-to-bracket"></i> Login
            </a>
            <a href="/register" class="btn btn-register">
                <i class="fa-solid fa-user-plus"></i> Register
            </a>
        </div>
    </div>

    <script>
        // Brain icon pulse animation setup via CSS injection
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes pulse {
                0% { transform: scale(1); opacity: 0.9; }
                50% { transform: scale(1.08); opacity: 1; text-shadow: 0 0 25px #a78bfa; }
                100% { transform: scale(1); opacity: 0.9; }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
